name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            platform: windows-x64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
            platform: linux-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
            platform: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libx11-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binaries
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/geo${{ matrix.suffix }} geo-${{ matrix.platform }}${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/lsh${{ matrix.suffix }} lsh-${{ matrix.platform }}${{ matrix.suffix }}

      - name: Upload geo artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-${{ matrix.platform }}${{ matrix.suffix }}
          path: geo-${{ matrix.platform }}${{ matrix.suffix }}

      - name: Upload lsh artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsh-${{ matrix.platform }}${{ matrix.suffix }}
          path: lsh-${{ matrix.platform }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            geo-windows-x64.exe/geo-windows-x64.exe
            geo-linux-x64/geo-linux-x64
            geo-macos-arm64/geo-macos-arm64
            lsh-windows-x64.exe/lsh-windows-x64.exe
            lsh-linux-x64/lsh-linux-x64
            lsh-macos-arm64/lsh-macos-arm64
          generate_release_notes: true
